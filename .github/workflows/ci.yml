name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - work

permissions:
  contents: read

jobs:
  docker-build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0
      - name: Generate MCP config schema label
        id: mcp-config-schema
        run: echo "schema=$(npm run --silent config-schema:label)" >> "$GITHUB_OUTPUT"
      - name: Build image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          push: false
          load: false
          tags: mcp-sentry:ci
          build-args: |
            MCP_CONFIG_SCHEMA=${{ steps.mcp-config-schema.outputs.schema }}
