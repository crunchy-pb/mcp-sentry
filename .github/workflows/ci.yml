name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - work

permissions:
  contents: read

jobs:
  checks:
    name: CI checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.16.0
      - name: Install dependencies
        run: npm install --ignore-scripts
      - name: Validate integration config schema label
        run: npm run config-schema:check
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0
      - name: Generate integration config schema label
        id: integration-config-schema
        run: echo "schema=$(npm run --silent config-schema:label)" >> "$GITHUB_OUTPUT"
      - name: Build image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          push: false
          load: false
          tags: mcp-sentry:ci
          build-args: |
            INTEGRATION_CONFIG_SCHEMA=${{ steps.integration-config-schema.outputs.schema }}

  release:
    name: Semantic release
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
      id-token: write
    outputs:
      new_release_published: ${{ steps.release-result.outputs.new_release_published }}
      version: ${{ steps.release-result.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.16.0
      - name: Install dependencies
        run: npm install --ignore-scripts
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm run release
      - name: Detect release result
        id: release-result
        run: |
          release_tag=$(git tag --points-at HEAD --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -n 1 || true)
          if [ -n "$release_tag" ]; then
            echo "new_release_published=true" >> "$GITHUB_OUTPUT"
            echo "version=${release_tag#v}" >> "$GITHUB_OUTPUT"
          else
            echo "new_release_published=false" >> "$GITHUB_OUTPUT"
          fi

  docker-publish:
    name: Publish Docker image
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4.2.2
        with:
          ref: v${{ needs.release.outputs.version }}
      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22.16.0
      - name: Install dependencies
        run: npm install --ignore-scripts
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0
      - name: Generate integration config schema label
        id: integration-config-schema
        run: echo "schema=$(npm run --silent config-schema:label)" >> "$GITHUB_OUTPUT"
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          push: true
          provenance: true
          sbom: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.release.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          build-args: |
            INTEGRATION_CONFIG_SCHEMA=${{ steps.integration-config-schema.outputs.schema }}
          labels: |
            org.opencontainers.image.version=${{ needs.release.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
